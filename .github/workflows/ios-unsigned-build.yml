name: Build unsigned iOS IPA

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm install

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: List available schemes (debug)
        working-directory: ios
        run: xcodebuild -list -workspace PlantScope.xcworkspace

      - name: Build unsigned .app
        working-directory: ios
        run: |
          xcodebuild \
            -workspace PlantScope.xcworkspace \
            -scheme PlantScope \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          set -e
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" -print -quit)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ../PlantScope-unsigned.ipa Payload
          cd ..
          ls -la PlantScope-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlantScope-unsigned-ipa
          path: PlantScope-unsigned.ipa
          retention-days: 14

